name: dijab
description: "Hoodie Startup - Premium streetwear e-commerce app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  cloud_functions: ^5.0.1
  google_sign_in: ^6.2.1
  google_sign_in_web:

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Image Handling & Caching
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # Network & HTTP
  http: ^1.2.2
  
  # Payments
  paymob_payment: ^0.0.1+1
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  
  # Responsive Design
  responsive_framework: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
